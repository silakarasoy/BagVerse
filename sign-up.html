<svg fill="none" stroke="currentColor" stroke-width="0.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 0 0-3.7-3.7 48.678 48.678 0 0 0-7.324 0 4.006 4.006 0 0 0-3.7 3.7c-.092 1.21-.138 2.43-.138 3.662v4.5c0 1.232.046 2.453.138 3.662a4.006 4.006 0 0 0 3.7 3.7 48.656 48.656 0 0 0 7.324 0 4.006 4.006 0 0 0 3.7-3.7c.092-1.21.138-2.43.138-3.662v-4.5Z" stroke-linecap="round" stroke-linejoin="round"></path>

</div>
</div>
<div class="relative z-10 flex min-h-screen flex-col items-center justify-center p-6 sm:p-8">
<a class="block mb-8 text-3xl sm:text-4xl font-bold tracking-wider text-stone-900 dark:text-stone-100 text-center" href="index.html">
  BagVerse
</a>
<div class="w-full max-w-md">
<div class="bg-white/50 dark:bg-stone-900/50 backdrop-blur-sm p-8 sm:p-10 rounded-2xl shadow-lg border border-stone-200/50 dark:border-stone-800/50">
<div class="space-y-6" x-show="!isRegister" x-transition:enter="transition ease-out duration-300" ...>
<div>
<h2 class="text-2xl sm:text-3xl font-bold text-center text-stone-900 dark:text-stone-100">Giriş Yap</h2>
<p class="mt-2 text-center text-sm text-stone-600 dark:text-stone-400">Hesabınıza hoş geldiniz!</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="login-email">E-posta Adresi</label>
<div class="mt-1">
<input autocomplete="email" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="login-email" name="email" required="" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="login-password">Şifre</label>
<div class="mt-1">
<input autocomplete="current-password" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="login-password" name="password" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-end">
<div class="text-sm">
<a class="font-medium text-primary hover:text-opacity-80 transition-colors" href="#">Şifremi Unuttum?</a>
</div>
</div>
<div>
<button class="flex w-full justify-center rounded-lg bg-primary py-3 px-4 text-sm font-semibold text-white shadow-sm transition-all duration-300 ease-in-out hover:shadow-lg hover:scale-105" type="submit">Giriş Yap</button>
</div>
</form>
</div>
<div class="space-y-6" x-show="isRegister" x-transition:enter="transition ease-out duration-300" x-transition:enter-end="opacity-100 transform translate-x-0" x-transition:enter-start="opacity-0 transform translate-x-4" x-transition:leave="transition ease-in duration-300" x-transition:leave-end="opacity-0 transform translate-x-4" x-transition:leave-start="opacity-100 transform translate-x-0">
<div>
<h2 class="text-2xl sm:text-3xl font-bold text-center text-stone-900 dark:text-stone-100">Kaydol</h2>
<p class="mt-2 text-center text-sm text-stone-600 dark:text-stone-400">Yeni bir hesap oluşturun.</p>
</div>
<form id="signup-form" class="space-y-4">
<div class="flex flex-col sm:flex-row gap-4">
<div class="flex-1">
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="name">Ad</label>
<div class="mt-1">
<input autocomplete="given-name" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="name" name="name" required="" type="text"/>
</div>
</div>
<div class="flex-1">
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="surname">Soyad</label>
<div class="mt-1">
<input autocomplete="family-name" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="surname" name="surname" required="" type="text"/>
</div>
</div>
</div>
<div>
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="register-email">E-posta Adresi</label>
<div class="mt-1">
<input autocomplete="email" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="register-email" name="email" required="" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="register-password">Şifre</label>
<div class="mt-1">
<input autocomplete="new-password" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="register-password" name="password" required="" type="password"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="confirm-password">Şifreyi Tekrar Gir</label>
<div class="mt-1">
<input autocomplete="new-password" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="confirm-password" name="confirm-password" required="" type="password"/>
</div>
</div>
<div>
<p class="mt-2 text-xs text-stone-500 dark:text-stone-400">En az 8 karakter, büyük harf, küçük harf ve rakam içermelidir.</p>
</div>
<div class="pt-2">
<button class="flex w-full justify-center rounded-lg bg-primary py-3 px-4 text-sm font-semibold text-white shadow-sm transition-all duration-300 ease-in-out hover:shadow-lg hover:scale-105" type="submit">Kaydol</button>
</div>
</form>
</div>
</div>
<div class="mt-6 text-center text-sm text-stone-600 dark:text-stone-400">
<p style="display: none;" x-show="!isRegister">Hesabın yok mu? <button @click="isRegister = true" class="font-medium text-primary hover:text-opacity-80 transition-colors">Kaydol</button></p>
<p x-show="isRegister">Hesabın var mı? <button @click="isRegister = false" class="font-medium text-primary hover:text-opacity-80 transition-colors">Giriş Yap</button></p>
</div>
</div>
</div>
<script defer="" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("signup-form");

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const surname = document.getElementById("surname").value;
    const email = document.getElementById("register-email").value;
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById("confirm-password").value;

    // Şifre eşleşmesi
    if (password !== confirmPassword) {
      alert("Şifreler eşleşmiyor!");
      return;
    }

    // Şifre kuralları
    const passwordRules = {
      minLength: password.length >= 8,
      hasUpper: /[A-Z]/.test(password),
      hasLower: /[a-z]/.test(password),
      hasDigit: /[0-9]/.test(password)
    };

    if (!passwordRules.minLength || !passwordRules.hasUpper || !passwordRules.hasLower || !passwordRules.hasDigit) {
      alert("Şifre en az 8 karakter, bir büyük harf, bir küçük harf ve bir rakam içermelidir.");
      return;
    }

    // Kullanıcı listesini oku
    let users = JSON.parse(localStorage.getItem("users")) || [];

// Aynı email var mı?
const existing = users.find(u => u.email === email);

if (existing) {
  // Eğer kullanıcı doğrulanmamışsa tekrar kayıt etmesine izin ver
  if (!existing.verified) {
    // Eski doğrulanmamış hesabı siliyoruz
    const filtered = users.filter(u => u.email !== email);
    localStorage.setItem("users", JSON.stringify(filtered));
  } else {
    alert("Bu e-posta adresiyle zaten doğrulanmış bir hesap var!");
    return;
  }
}


    // Yeni kullanıcı oluştur
    const newUser = {
      name,
      surname,
      email,
      password,
      verified: false
    };

    // Diziye ekle
    users.push(newUser);

    // localStorage'a geri kaydet
    localStorage.setItem("users", JSON.stringify(users));

    // E-posta doğrulama için geçici kullanıcıyı da sakla
localStorage.setItem("pendingUser", JSON.stringify(newUser));

    // Doğrulama sayfasına yönlendir
    window.location.href = "verify-email.html";
  });
});
</script>



</body></html>
