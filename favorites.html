<script>
document.addEventListener("DOMContentLoaded", () => {
  const grid = document.getElementById("favoritesGrid");

  document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t =>
      t.classList.remove("border-b-primary", "text-primary")
    );

    tab.classList.add("border-b-primary", "text-primary");

    const type = tab.dataset.tab;
    let list = getFavorites();

    if (type === "sale") {
      list = list.filter(p => p.onSale);
    }

    if (type === "out") {
      list = list.filter(p => p.stock === 0);
    }

    render(list);
  });
});


  const searchInput = document.getElementById("favoriteSearch");

searchInput?.addEventListener("input", () => {
  const query = searchInput.value.toLowerCase().trim();

  const filtered = getFavorites().filter(p =>
    p.name.toLowerCase().includes(query)
  );

  render(filtered);
});

  function getFavorites() {
    return JSON.parse(localStorage.getItem("favorites")) || [];
  }

  function setFavorites(list) {
    localStorage.setItem("favorites", JSON.stringify(list));
  }

  function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
  }

  function setCart(list) {
    localStorage.setItem("cart", JSON.stringify(list));
  }

 function render(list, isFiltered = false) {
  const allFavorites = getFavorites();

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="col-span-full text-center text-slate-400 py-20">
        ${isFiltered && allFavorites.length > 0
          ? "Bu filtreye uygun ürün yok."
          : "Favorileriniz boş."}
      </div>`;
    return;
  }

    grid.innerHTML = list.map(p => `
      <div class="bg-white rounded-3xl shadow-sm p-4 flex flex-col gap-4">

        <div class="relative rounded-2xl overflow-hidden bg-slate-100">
          <img src="${p.image}" class="w-full h-[260px] object-cover"/>

          <button
            class="remove-fav absolute top-3 right-3 bg-white size-9 rounded-full
                   flex items-center justify-center text-red-500"
            data-id="${p.id}">
            <span class="material-symbols-outlined">favorite</span>
          </button>
        </div>

        <div>
          <p class="font-medium">${p.name}</p>
          <p class="text-slate-500">₺${p.price}</p>
        </div>

        <button
          class="add-cart h-11 rounded-xl bg-[#f3dfd6] text-[#9a5b45] font-semibold"
          data-id="${p.id}">
          Sepete Ekle
        </button>
      </div>
    `).join("");
  }

  // ilk render
  render(getFavorites());

  // 🔥 EVENT DELEGATION
  document.addEventListener("click", (e) => {

    /* FAVORİDEN ÇIKAR */
    if (e.target.closest(".remove-fav")) {
      const id = e.target.closest(".remove-fav").dataset.id;
      const updated = getFavorites().filter(p => p.id !== id);
      setFavorites(updated);
      render(updated);
    }

    /* SEPETE EKLE */
    if (e.target.closest(".add-cart")) {
      const id = e.target.closest(".add-cart").dataset.id;
      const favorites = getFavorites();
      const product = favorites.find(p => p.id === id);
      if (!product) return;

      const cart = getCart();
      const existing = cart.find(i => i.id === id);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          price: product.price,
          image: product.image,
          quantity: 1
        });
      }

      setCart(cart);
      showToast("🛒 Sepete eklendi");
    }

  });
});

// 🍞 TOAST
function showToast(msg) {
  let toast = document.getElementById("toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "toast";
    toast.className =
      "fixed bottom-6 right-6 bg-black/90 text-white px-5 py-3 rounded-xl text-sm";
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 2000);
}


document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    handleTab(tab.dataset.tab);
    setActiveTab(tab);
  });
});

function setActiveTab(activeTab) {
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.remove("border-b-primary", "text-primary");
    t.classList.add("border-b-transparent", "text-slate-500");
  });

  activeTab.classList.add("border-b-primary", "text-primary");
}


function handleTab(type) {
  const favorites = getFavorites();
  let filtered = favorites;

  if (type === "sale") {
    filtered = favorites.filter(p => p.sale === true);
  }

  if (type === "price-drop") {
    filtered = favorites.filter(p => p.sale === true);
  }

  if (type === "out") {
    filtered = favorites.filter(p => p.inStock === false);
  }

  render(filtered, type !== "all");
}




</script>
