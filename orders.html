<script>
document.addEventListener("DOMContentLoaded", () => {



  console.log("RAW orders:", JSON.parse(localStorage.getItem("orders")));
console.log("currentUser:", JSON.parse(localStorage.getItem("currentUser")));





  const tableBody = document.getElementById("ordersTable");
  const emptyState = document.getElementById("emptyState");

  const currentUser = JSON.parse(localStorage.getItem("currentUser"));
  const allOrders = JSON.parse(localStorage.getItem("orders")) || [];

  // ❌ Giriş yoksa
  if (!currentUser) {
    console.warn("Kullanıcı bulunamadı");
    emptyState.classList.remove("hidden");
    return;
  }

  // ✅ Siparişleri kullanıcıya göre filtrele
  const orders = allOrders.filter(
    order => order.userEmail === currentUser.email
  );

  // ✅ Profil bilgileri
  const userNameEl = document.getElementById("userName");
  const userEmailEl = document.getElementById("userEmail");

  if (userNameEl) {
    userNameEl.textContent =
      currentUser.name + " " + currentUser.surname;
  }

  if (userEmailEl) {
    userEmailEl.textContent = currentUser.email;
  }

  // ✅ Siparişleri render et
  function renderOrders() {
    tableBody.innerHTML = "";

    if (orders.length === 0) {
      emptyState.classList.remove("hidden");
      return;
    }

    emptyState.classList.add("hidden");

    orders.forEach(order => {
      tableBody.innerHTML += `
        <tr>
          <td class="px-6 py-4 font-medium">#${order.id}</td>
          <td class="px-6 py-4">${order.date}</td>
          <td class="px-6 py-4 font-medium">₺${order.total}</td>
          <td class="px-6 py-4">Hazırlanıyor</td>
          <td class="px-6 py-4 text-right">
            <a href="order-tracking.html?id=${order.id}"
               class="text-primary font-semibold">
              Sipariş Detayları
            </a>
          </td>
        </tr>
      `;
    });
  }

  renderOrders();
});
</script>
