<div class="mb-8 text-center">
<h1 class="text-4xl font-black leading-tight tracking-tight text-slate-900 dark:text-white">Yeni Adres Ekle</h1>
<p class="mt-2 text-base font-normal leading-normal text-slate-600 dark:text-slate-400">Teslimat için kullanılacak yeni bir adres bilgisi girin.</p>
</div>
<!-- Form Container -->
<div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800 sm:p-8">
<form id="addressForm" class="space-y-6">
<div class="grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-2">
<!-- Ad (Name) -->

<label class="flex flex-col">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Ad</p>
<input id="name" class="form-input flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="Adınızı girin" value=""/>
</label>
<!-- Soyad (Surname) -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Soyad</p>
<input  id="surname" class=" flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="Soyadınızı girin" value=""/>
</label>
<!-- Telefon Numarası (Phone Number) -->
<label class="flex flex-col sm:col-span-2">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Telefon Numarası</p>
<input id="phone"  type="tel" class="form-input flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="555 123 4567" type="tel" value=""/>
</label>
<!-- Adres Satırı 1 (Address Line 1) -->
<label class="flex flex-col sm:col-span-2">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Adres Satırı 1</p>
<input  id="address1" class="form-input flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="Mahalle, sokak ve kapı no girin" value=""/>
</label>
<!-- Adres Satırı 2 (Address Line 2) -->
<label class="flex flex-col sm:col-span-2">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Adres Satırı 2 <span class="text-sm text-slate-500 dark:text-slate-400">(İsteğe Bağlı)</span></p>
<input id="address2" class="form-input flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="Bina adı, daire no vb." value=""/>
</label>
<!-- Ülke (Country) -->
<label class="flex flex-col sm:col-span-2">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Ülke</p>
<select class="form-select flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50">
<option>Türkiye</option>
<option>Almanya</option>
<option>Fransa</option>
<option>Birleşik Krallık</option>
</select>
</label>
<!-- Şehir, İlçe, Posta Kodu Grid -->
<div class="sm:col-span-2">
<div class="grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-3">
<!-- Şehir (City) -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Şehir</p>
<input id="city" class="form-input flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="İstanbul" value=""/>
</label>
<!-- İlçe (District) -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">İlçe</p>
<input  id="district" class="form-input flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="Kadıköy" value=""/>
</label>
<!-- Posta Kodu (Postal Code) -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium text-slate-800 dark:text-slate-200">Posta Kodu</p>
<input id="postalCod" class="form-input flex w-full flex-1 rounded-lg border border-slate-300 bg-transparent py-3 px-4 text-slate-900 placeholder:text-slate-400 focus:border-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-50 dark:placeholder:text-slate-500" placeholder="34710" value=""/>
</label>
</div>
</div>
</div>
<!-- Checkbox -->
<div class="relative flex items-start pt-2">
  <div class="flex h-6 items-center">
    <input id="isDefault" name="isDefault" type="checkbox" class="form-checkbox size-4 rounded border-slate-400 text-primary focus:ring-primary dark:border-slate-500 dark:bg-slate-700"/>
  </div>
  <div class="ml-3 text-sm leading-6">
    <label class="font-medium text-slate-700 dark:text-slate-300" for="isDefault">Bu adresi varsayılan teslimat adresi olarak ayarla</label>
  </div>
</div>
<!-- Action Buttons -->
<div class="flex items-center justify-end gap-4 border-t border-slate-200 pt-6 dark:border-slate-700">
<a
  href="profile-address.html"
  class="flex cursor-pointer items-center justify-center rounded-lg px-5 py-2.5 text-sm font-semibold text-slate-700 ring-1 ring-inset ring-slate-300 hover:bg-slate-100 dark:text-slate-200 dark:ring-slate-600 dark:hover:bg-slate-700">
  İptal
</a>
<button class="flex cursor-pointer items-center justify-center rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary/90" type="button" id="saveAddressBtn">Kaydet</button> 

</div>
</form>

<script>

    const editIndex = localStorage.getItem("editAddressIndex");
  const addresses = JSON.parse(localStorage.getItem("addresses")) || [];

  if (editIndex !== null && addresses[editIndex]) {
    const address = addresses[editIndex];

    document.getElementById("name").value = address.name.split(" ")[0] || "";
    document.getElementById("surname").value = address.name.split(" ")[1] || "";
    document.getElementById("phone").value = address.phone || "";
    document.getElementById("address1").value = address.address1 || "";
    document.getElementById("address2").value = address.address2 || "";
    document.getElementById("city").value = address.city || "";
    document.getElementById("district").value = address.district || "";
    document.getElementById("postalCod").value = address.postalCode || "";
    document.getElementById("isDefault").checked = address.isDefault || false;
  }
  const form = document.getElementById("addressForm");

 document.getElementById("saveAddressBtn").addEventListener("click", () => {

  const newAddress = {
    title: "Adresim",
    name:
      document.getElementById("name").value +
      " " +
      document.getElementById("surname").value,
    phone: document.getElementById("phone").value,
    detail: `
      ${document.getElementById("address1").value}
      ${document.getElementById("address2").value}
      ${document.getElementById("district").value} /
      ${document.getElementById("city").value}
      ${document.getElementById("postalCod").value}
    `,
    isDefault: document.getElementById("isDefault").checked
  };

  const addresses = JSON.parse(localStorage.getItem("addresses")) || [];

  if (newAddress.isDefault) {
    addresses.forEach(addr => addr.isDefault = false);
  }

  addresses.push(newAddress);
  localStorage.setItem("addresses", JSON.stringify(addresses));

  const fromCheckout =
    new URLSearchParams(window.location.search).get("from") === "checkout";

  window.location.href = fromCheckout
    ? "checkout.html"
    : "profile-address.html";
});
</script>
