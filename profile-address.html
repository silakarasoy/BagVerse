<script>

const addresses = JSON.parse(localStorage.getItem("addresses")) || [];


  const addAddressTopBtn = document.getElementById("addAddressTopBtn");

const addressEmpty = document.getElementById("addressEmpty");
const addressList = document.getElementById("addressList");



function renderAddresses() {
  addressList.innerHTML = "";

  if (addresses.length === 0) {
    addressEmpty.classList.remove("hidden");
    addressList.classList.add("hidden");
    addAddressTopBtn.classList.add("hidden");
    return;
  }

  addressEmpty.classList.add("hidden");
  addressList.classList.remove("hidden");
  addAddressTopBtn.classList.remove("hidden");

  addresses.forEach((address, index) => {
    addressList.innerHTML += `
      <div class="flex flex-col gap-4 rounded-xl border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900/50">
        <h1 class="text-xl font-bold">${address.title}</h1>

        <div class="text-sm text-slate-600 dark:text-slate-400 space-y-1">
          <p class="font-medium">${address.name}</p>
          <p>${address.detail}</p>
          <p>${address.phone}</p>
        </div>

<div class="mt-3 flex gap-4">
  <button
    onclick="editAddress(${index})"
    class="text-sm font-semibold text-primary hover:underline">
    Düzenle
  </button>

  <button
    onclick="deleteAddress(${index})"
    class="text-sm font-semibold text-red-500 hover:underline">
    Sil
  </button>
</div>

    `;
  });
}





function deleteAddress(index) {
  addresses.splice(index, 1);
  localStorage.setItem("addresses", JSON.stringify(addresses));
  renderAddresses();
}

renderAddresses();
</script>

<script>
  function editAddress(index) {
    localStorage.setItem("editAddressIndex", index);
    window.location.href = "adress-form.html";
  }
</script>


<script>
document.addEventListener("DOMContentLoaded", () => {
  const currentUser = JSON.parse(localStorage.getItem("currentUser"));

  if (currentUser) {
    // Sidebar user info
    const sidebarName = document.querySelector("aside h1");
    const sidebarEmail = document.querySelector("aside p");

    if (sidebarName) sidebarName.textContent = currentUser.name + " " + currentUser.surname;
    if (sidebarEmail) sidebarEmail.textContent = currentUser.email;

    // Header user avatar/alt text vs.
    const headerAvatar = document.querySelector("header [data-alt='User profile picture']");
    if (headerAvatar) {
