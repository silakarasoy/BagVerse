<script>
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
const allPayments = JSON.parse(localStorage.getItem("paymentMethods")) || [];

const paymentList = document.getElementById("paymentList");

const userPayments = allPayments.filter(
  card => card.userEmail === currentUser.email
);

if (userPayments.length === 0) {
  paymentList.innerHTML = `
    <div class="flex flex-col items-center justify-center gap-6 rounded-xl border border-dashed border-slate-300 py-16 text-center">
      <span class="material-symbols-outlined text-4xl text-slate-400">credit_card_off</span>
      <p class="text-slate-500">Kayıtlı ödeme yönteminiz yok</p>
    </div>
  `;
} else {
  paymentList.innerHTML = "";

  userPayments.forEach(card => {
    paymentList.innerHTML += `
      <div class="flex flex-col gap-4 rounded-xl border border-slate-200 bg-white p-5 sm:flex-row sm:items-center sm:justify-between">
        
        <div class="flex flex-col">
          <p class="font-semibold">${card.type} •••• ${card.last4}</p>
          <p class="text-sm text-slate-500">Son Kullanma: ${card.expiry}</p>
          <p class="text-sm text-slate-500">Kart Sahibi: ${card.name}</p>
        </div>

        <div class="flex items-center gap-3">
          ${card.isDefault ? `<span class="text-xs text-primary font-semibold mr-2">DEFAULT</span>` : ""}

          <button
            onclick="editCard(${card.id})"
            class="flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-100"
            title="Düzenle"
          >
            <span class="material-symbols-outlined text-lg">edit</span>
          </button>

          <button
            onclick="deleteCard(${card.id})"
            class="flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 text-red-500 hover:bg-red-50"
            title="Sil"
          >
            <span class="material-symbols-outlined text-lg">delete</span>
          </button>
        </div>

      </div>
    `;
  });
}

function deleteCard(cardId) {
  const paymentMethods =
    JSON.parse(localStorage.getItem("paymentMethods")) || [];

  const updated = paymentMethods.filter(card => card.id !== cardId);
  localStorage.setItem("paymentMethods", JSON.stringify(updated));
  location.reload();
}

function editCard(cardId) {
  window.location.href = `edit-payment-method.html?id=${cardId}`;
}

</script>
