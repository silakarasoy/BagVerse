<script>

function getEstimatedDelivery(orderDate) {
  const start = new Date(orderDate);

  const minDays = 3;
  const maxDays = 10;

  const randomDays =
    Math.floor(Math.random() * (maxDays - minDays + 1)) + minDays;

  const end = new Date(start);
  end.setDate(start.getDate() + randomDays);

  return `${start.toLocaleDateString("tr-TR")} - ${end.toLocaleDateString("tr-TR")}`;
}



  console.log("orders:", localStorage.getItem("orders"));
console.log("lastOrderId:", localStorage.getItem("lastOrderId"));

const orders = JSON.parse(localStorage.getItem("orders")) || [];
const lastOrderId = localStorage.getItem("lastOrderId");

if (!lastOrderId) {
  alert("Sipariş ID bulunamadı");
  window.location.href = "index.html";
}

const lastOrder = orders.find(o => String(o.id) === String(lastOrderId));

if (!lastOrder) {
  alert("Sipariş bulunamadı");
  window.location.href = "index.html";
}


document.getElementById("orderId").innerText = "#" + lastOrder.id;




// 🚚 Kargo Bilgileri
document.getElementById("deliveryDate").innerText =
  getEstimatedDelivery(lastOrder.date);



document.getElementById("cargoCompany").innerText =
  lastOrder.shippingInfo?.company || "Belirlenmedi";

document.getElementById("trackingNumber").innerText =
  lastOrder.shippingInfo?.trackingNo || "-";

// 🧾 Sipariş No
document.getElementById("orderId").innerText =
  "#BV-" + lastOrder.id;

  
const steps = [
  "Sipariş Alındı",
  "Hazırlanıyor",
  "Kargoya Verildi",
  "Yolda",
  "Teslim Edildi"
];

const randomStepIndex = Math.floor(Math.random() * 3);
lastOrder.status = steps[randomStepIndex];




const timeline = document.getElementById("timeline");
const currentStepIndex = steps.indexOf(lastOrder.status);

timeline.innerHTML = "";

steps.forEach((step, index) => {
  const isDone = index <= currentStepIndex;

  timeline.innerHTML += `
    <li class="flex items-start">
      <div class="flex-shrink-0">
        <div class="flex h-5 w-5 items-center justify-center rounded-full
          ${isDone ? "bg-primary" : "bg-slate-300 dark:bg-slate-600"}
          ring-4 ring-background-light dark:ring-slate-800/50">
          ${isDone ? '<span class="material-symbols-outlined text-xs text-white">check</span>' : ''}
        </div>
      </div>

      <div class="ml-4">
        <h4 class="font-semibold
          ${isDone ? "text-slate-800 dark:text-slate-200" : "text-slate-500 dark:text-slate-400"}">
          ${step}
        </h4>
      </div>
    </li>
  `;
});

</script>
