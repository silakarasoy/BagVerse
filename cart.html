 <div id="discount-row" class="flex justify-between items-center" style="display:none;">

  <p class="text-xs text-slate-400 text-right -mt-2">
    3000 TL ve üzeri alışverişlerde kargo ücretsiz! 🚚
  </p>
  
  <p class="text-xs text-slate-400 text-right -mt-2">
Ödeme adımında hesaplanacaktır.  </p>
</div>

<div class="border-t pt-4">
  <div class="flex justify-between items-center text-lg">
    <p class="font-semibold">Genel Toplam</p>
    <p id="total" class="font-bold text-right">0,00 TL</p>
  </div>
</div>

<!-- Primary CTA -->
 <a href="checkout.html">
<button class="w-full flex items-center justify-center rounded-lg bg-[#E2725B] hover:bg-[#d9634a] px-6 py-3 text-base font-bold text-white shadow-sm transition-colors">

                               <span class="material-symbols-outlined ml-2">arrow_forward</span>

<script>


console.log(
  document.getElementById("cardNumber"),
  document.getElementById("cardName"),
  document.getElementById("cardDate"),
  document.getElementById("cardCVV")
);



const cartItemsEl = document.getElementById("cart-items");
const subtotalEl = document.getElementById("subtotal");
const shippingEl = document.getElementById("shipping");
const totalEl = document.getElementById("total");
const cartCountEl = document.getElementById("cart-count");
const promoInput = document.getElementById("promo-code");
const applyPromoBtn = document.getElementById("apply-promo");
const discountRow = document.getElementById("discount-row");
const discountEl = document.getElementById("discount");

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let appliedDiscount = 0;
let appliedPromoCode = null;

function renderCart() {
  cartItemsEl.innerHTML = "";

  if (cart.length === 0) {
    cartItemsEl.innerHTML = `
      <tr>
        <td colspan="5" class="p-10 text-center text-slate-400">
          Sepetiniz boş 🛒
        </td>
      </tr>`;
    cartCountEl.innerText = "Sepetim (0 Ürün)";
    subtotalEl.innerText = "0,00 TL";
    totalEl.innerText = "0,00 TL";
    return;
  }

  

  let subtotal = 0;

  let totalQuantity = 0;

  cart.forEach((item, index) => {
    subtotal += item.price * item.quantity;
    totalQuantity += item.quantity;
    appliedDiscount = Math.min(appliedDiscount, subtotal);


    cartItemsEl.innerHTML += `
      <tr class="border-b border-slate-200 dark:border-slate-800">
        <td class="p-4">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-lg bg-cover bg-center"
                 style="background-image:url('${item.image}')"></div>
            <div>
              <p class="font-semibold">${item.name}</p>
           ${item.color ? `
  <p class="text-sm text-slate-400">Renk: ${item.color}</p>
` : ``}

            </div>
          </div>
        </td>

        <td class="p-4 text-right">${item.price} TL</td>

        <td class="p-4">
          <div class="flex justify-center border rounded-lg">
            <button onclick="changeQty(${index}, -1)" class="px-2">-</button>
            <span class="px-2">${item.quantity}</span>
            <button onclick="changeQty(${index}, 1)" class="px-2">+</button>
          </div>
        </td>

        <td class="p-4 text-right font-bold">
          ${item.price * item.quantity} TL
        </td>

        <td class="p-4 text-center">
<button 
  onclick="removeItem(${index})"
  class="text-red-500 hover:text-red-700 transition"
  title="Ürünü sil">
  <span class="material-symbols-outlined">delete</span>
</button>
        </td>
      </tr>
    `;
  });

  cartCountEl.innerText = `Sepetim (${totalQuantity} Ürün)`;
  subtotalEl.innerText = subtotal.toFixed(2) + " TL";
let shipping = subtotal >= 3000 ? 0 : 50;

shippingEl.innerText = shipping === 0 ? "Ücretsiz" : shipping.toFixed(2) + " TL";


discountRow.style.display = appliedDiscount > 0 ? "flex" : "none";
discountEl.innerText = "- " + appliedDiscount.toFixed(2) + " TL";

let finalTotal = subtotal - appliedDiscount + shipping;
totalEl.innerText = finalTotal.toFixed(2) + " TL";

localStorage.setItem("cartSubtotal", subtotal);
localStorage.setItem("cartDiscount", appliedDiscount);
localStorage.setItem("cartShipping", shipping);
localStorage.setItem("cartTotal", finalTotal);


if (appliedDiscount > 0) {
  discountRow.classList.remove("hidden");
  discountEl.innerText = "- " + appliedDiscount.toFixed(2) + " TL";
} else {
  discountRow.classList.add("hidden");
}



  localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(index, amount) {
  cart[index].quantity += amount;
  if (cart[index].quantity <= 0) cart.splice(index, 1);
  renderCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}


applyPromoBtn.addEventListener("click", () => {
  const code = promoInput.value
    .trim()
    .toUpperCase()
    .replaceAll("İ", "I");

  if (!code) {
    showToast("İndirim kodu giriniz ✍️", "info");
    return;
  }

  if (appliedPromoCode === code) {
    showToast("Bu indirim kodu zaten uygulandı ⚠️", "info");
    return;
  }

  let subtotal = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
  appliedDiscount = 0;

  if (code === "BAGVERSE10") {
    appliedDiscount = subtotal * 0.10;
    showToast("🎉 %10 indirim uygulandı!", "success");
  } 
  else if (code === "INDIRIM200") {
    appliedDiscount = 200;
    showToast("🎉 200 TL indirim uygulandı!", "success");
  } 
  else {
    showToast("Geçersiz indirim kodu 😢", "error");
    return;
  }

  appliedPromoCode = code;
  localStorage.setItem("appliedPromoCode", code);
  renderCart();
});


if (cart.length === 0) {
  appliedDiscount = 0;
  appliedPromoCode = null;
}



function showToast(message, type = "success") {
  const toast = document.getElementById("toast");
  const toastMessage = document.getElementById("toast-message");

  toastMessage.innerText = message;

  // Renkler
  toast.className =
    "fixed top-6 right-6 z-50 max-w-sm rounded-lg shadow-lg p-4 text-white transition-all duration-300";

  if (type === "success") {
    toast.classList.add("bg-green-500");
  } else if (type === "error") {
    toast.classList.add("bg-red-500");
  } else if (type === "info") {
    toast.classList.add("bg-blue-500");
  }

  toast.classList.remove("hidden");

  setTimeout(() => {
    toast.classList.add("hidden");
  }, 3000);
}


renderCart();


console.log(cartItemsEl);

</script>

<div id="toast"
  class="fixed top-6 right-6 z-50 hidden max-w-sm rounded-lg shadow-lg p-4 text-white transition-all duration-300">
  <p id="toast-message" class="text-sm font-medium"></p>
</div>
 
</body></html>
