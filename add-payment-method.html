<script>
const form = document.querySelector("form");
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

form.addEventListener("submit", function (e) {
  e.preventDefault();

  const cardNumber = document.getElementById("cardNumber").value.trim();
  const cardName = document.getElementById("cardName").value.trim();
  const expiryMonth = document.getElementById("expiryMonth").value.trim();
  const expiryYear = document.getElementById("expiryYear").value.trim();
  const cvv = document.getElementById("cvv").value.trim();
  const isDefault = document.getElementById("defaultMethod").checked;

  if (!cardNumber || !cardName || !expiryMonth || !expiryYear || !cvv) {
    alert("Lütfen tüm alanları doldurun");
    return;
  }

  const last4 = cardNumber.slice(-4);

  let paymentMethods =
    JSON.parse(localStorage.getItem("paymentMethods")) || [];

  if (isDefault) {
    paymentMethods = paymentMethods.map(card => ({
      ...card,
      isDefault: false
    }));
  }

  const newCard = {
    id: Date.now(),
    userEmail: currentUser.email,
    type: "Visa",
    last4: last4,
    expiry: `${expiryMonth}/${expiryYear}`,
    name: cardName,
    isDefault: isDefault
  };

  paymentMethods.push(newCard);

  localStorage.setItem(
    "paymentMethods",
    JSON.stringify(paymentMethods)
  );

  window.location.href = "payment-methods.html";
});
</script>


<script>
const cardNumberInput = document.getElementById("cardNumber");

cardNumberInput.addEventListener("input", (e) => {
  let value = e.target.value;

  // boşlukları sil
  value = value.replace(/\s+/g, "");

  // sadece rakam kalsın
  value = value.replace(/\D/g, "");

  // 4’erli gruplar
  value = value.match(/.{1,4}/g)?.join(" ") || "";

  // max 19 karakter (16 rakam + 3 boşluk)
  e.target.value = value.substring(0, 19);
});


cardNumberInput.addEventListener("input", (e) => {
  let value = e.target.value.replace(/\D/g, ""); // sadece rakam
  value = value.substring(0, 16); // max 16 hane

  // 4'lü gruplara ayır
  value = value.replace(/(.{4})/g, "$1 ").trim();

  e.target.value = value;
});


const expiryMonth = document.getElementById("expiryMonth");
const expiryYear = document.getElementById("expiryYear");

expiryMonth.addEventListener("input", () => {
  expiryMonth.value = expiryMonth.value.replace(/\D/g, "").substring(0, 2);

  if (expiryMonth.value.length === 2) {
    expiryYear.focus();
  }
});

expiryYear.addEventListener("input", () => {
  expiryYear.value = expiryYear.value.replace(/\D/g, "").substring(0, 2);
});


const cvvInput = document.getElementById("cvv");

cvvInput.addEventListener("input", () => {
  cvvInput.value = cvvInput.value.replace(/\D/g, "").substring(0, 3);
});


cardNumberInput.addEventListener("input", () => {
  const firstDigit = cardNumberInput.value.trim()[0];

  if (firstDigit === "4") {
    console.log("Visa");
  } else if (firstDigit === "5") {
    console.log("Mastercard");
  }
});


</script>


<script>
const expiryMonthInput = document.getElementById("expiryMonth");

expiryMonthInput.addEventListener("input", () => {
  let value = expiryMonthInput.value;

  // sadece rakam kalsın
  value = value.replace(/\D/g, "");

  // en fazla 2 hane
  if (value.length > 2) {
    value = value.slice(0, 2);
  }

  // 12'den büyükse 12 yap
  if (parseInt(value, 10) > 12) {
    value = "12";
  }

  // 00 olmasın
  if (value === "00") {
    value = "01";
  }

  expiryMonthInput.value = value;
});


form.addEventListener("submit", function (e) {
  e.preventDefault(); // sayfa yenilenmesin

  const currentUser = JSON.parse(localStorage.getItem("currentUser"));
  if (!currentUser) {
    alert("Lütfen giriş yapın");
    return;
  }

  const cardNumberRaw = document.getElementById("cardNumber").value;
  const cardNumber = cardNumberRaw.replace(/\s/g, "");

  const cardName = document.getElementById("cardName").value.trim();
  const month = document.getElementById("expiryMonth").value;
  const year = document.getElementById("expiryYear").value;
  const cvv = document.getElementById("cvv").value;
  const isDefault = document.getElementById("defaultMethod").checked;

  // basit kontrol
  if (
    cardNumber.length !== 16 ||
    !cardName ||
    month.length !== 2 ||
    year.length !== 2 ||
    cvv.length < 3
  ) {
    alert("Lütfen tüm alanları doğru doldurun");
    return;
  }

  const paymentMethods =
    JSON.parse(localStorage.getItem("paymentMethods")) || [];

  // Eğer bu kart varsayılan olacaksa, kullanıcının diğer kartlarını false yap
  if (isDefault) {
    paymentMethods.forEach(card => {
      if (card.userEmail === currentUser.email) {
        card.isDefault = false;
      }
    });
  }

  const newCard = {
    id: Date.now(),
    userEmail: currentUser.email,
    type: cardNumber.startsWith("4") ? "Visa" : "MasterCard",
    last4: cardNumber.slice(-4),
    expiry: `${month}/${year}`,
    name: cardName,
    isDefault: isDefault
  };

  paymentMethods.push(newCard);
  localStorage.setItem("paymentMethods", JSON.stringify(paymentMethods));

  // ödeme yöntemleri sayfasına dön
  window.location.href = "payment-methods.html";
});
</script>
