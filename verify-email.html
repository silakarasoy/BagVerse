<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BagVerse E-posta Doğrulama</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#333333] dark:text-gray-200">
<div class="relative flex h-auto min-h-screen w-full flex-col items-center justify-center p-4 group/design-root overflow-x-hidden">
<div class="absolute top-8 left-8 text-2xl font-bold text-gray-800 dark:text-gray-100">BagVerse</div>
<main class="w-full max-w-md">
<div class="bg-white dark:bg-gray-800/50 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-8 text-center">
<div class="flex justify-center mb-6">
<div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="mail">mail</span>
</div>
</div>
<h1 class="text-[#0d141b] dark:text-white tracking-light text-2xl md:text-3xl font-bold leading-tight pb-3 pt-2">Hesabınızı Doğrulayın</h1>
<p class="text-gray-600 dark:text-gray-300 text-base font-normal leading-normal pb-6 pt-1">
                    Doğrulama e-postası <strong>kullanici***@email.com</strong> adresine gönderildi. Lütfen gelen kutunuzu (ve spam klasörünüzü) kontrol edin ve hesabınızı doğrulamak için bağlantıya tıklayın.
                </p>
<a href="log-in.html">
<div class="mb-6">
<div class="flex px-4 py-3 justify-center">
<button class="flex min-w-[84px] w-full max-w-xs cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary text-slate-50 text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors">
<span class="truncate">Giriş Sayfasına Dön</span>
</button>
</div>
</div> </a>
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal pb-3 pt-1">
                    E-postayı almadınız mı? <a id="resend-email" class="font-medium text-primary hover:underline" href="#">
    Doğrulama E-postasını Tekrar Gönder
</a>

</p>
</div>
</main>
</div>


<script>
document.addEventListener("DOMContentLoaded", () => {

    const pendingUser = JSON.parse(localStorage.getItem("pendingUser"));

    // pendingUser yoksa kaydola yollama, giriş sayfasına yolla
    if (!pendingUser) {
        window.location.href = "log-in.html"; 
        return;
    }

    const maskEmail = (email) => {
        const [name, domain] = email.split("@");
        return name.slice(0, 3) + "***@" + domain;
    };

    const emailElement = document.querySelector("p strong");
    if (emailElement) emailElement.textContent = maskEmail(pendingUser.email);

    const loginButton = document.querySelector("a[href='log-in.html'], a[href='login.html']");
    if (loginButton) {
        loginButton.addEventListener("click", (e) => {
            e.preventDefault();

            pendingUser.verified = true;

let savedUsers = JSON.parse(localStorage.getItem("users")) || [];

            // Aynı e-posta varsa üzerine yazmasın → duplicate fix
            savedUsers = savedUsers.filter(u => u.email !== pendingUser.email);
            savedUsers.push(pendingUser);

            localStorage.setItem("users", JSON.stringify(savedUsers));
            localStorage.removeItem("pendingUser");

            window.location.href = "log-in.html";
        });
    }

    document.querySelector("#resend-email")?.addEventListener("click", (e) => {
        e.preventDefault();
        alert("Doğrulama e-postası tekrar gönderildi! (Simülasyon)");
    });
});
</script>



</body></html>
