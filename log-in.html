<!DOCTYPE html>
<html lang="tr"><head>

<style>

      0% { transform: translateY(0px) rotate(-10deg); }

      50% { transform: translateY(-15px) rotate(12deg); }
      100% { transform: translateY(0px) rotate(10deg); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    .animate-float-reverse {
      animation: float-reverse 7s ease-in-out infinite;
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-stone-800 dark:text-stone-200 antialiased">
<div class="relative min-h-screen overflow-hidden">
<div aria-hidden="true" class="absolute inset-0 z-0">
<div class="absolute top-[10%] left-[5%] w-48 h-48 text-stone-300/50 dark:text-stone-700/50 animate-float">

</svg>
</div>
<div class="absolute bottom-[5%] right-[8%] w-56 h-56 text-stone-300/50 dark:text-stone-700/50 animate-float-reverse">
<svg fill="none" stroke="currentColor" stroke-width="0.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

</div>
<div class="relative z-10 flex min-h-screen flex-col items-center justify-center p-6 sm:p-8">
<a class="absolute top-6 sm:top-8 text-3xl sm:text-4xl font-bold tracking-wider text-stone-900 dark:text-stone-100" href="index.html">BagVerse</a>
<div class="w-full max-w-md">
<div class="bg-white/50 dark:bg-stone-900/50 backdrop-blur-sm p-8 sm:p-10 rounded-2xl shadow-lg border border-stone-200/50 dark:border-stone-800/50">
<div class="space-y-6">
<div>
<h2 class="text-2xl sm:text-3xl font-bold text-center text-stone-900 dark:text-stone-100">Giriş Yap</h2>
<p class="mt-2 text-center text-sm text-stone-600 dark:text-stone-400">Hesabınıza hoş geldiniz!</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="login-email">E-posta Adresi</label>
<div class="mt-1">
<input autocomplete="email" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 px-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="login-email" name="email" required="" type="email"/>
</div>
</div>
<div x-data="{ showPassword: false }">
<label class="block text-sm font-medium text-stone-700 dark:text-stone-300" for="login-password">Şifre</label>
<div class="relative mt-1">
<input :type="showPassword ? 'text' : 'password'" autocomplete="current-password" class="block w-full appearance-none rounded-lg border border-stone-300 bg-white/50 dark:bg-stone-800/50 dark:border-stone-700 pr-10 pl-3 py-2 placeholder-stone-400 dark:placeholder-stone-500 shadow-sm focus:border-primary focus:outline-none focus:ring-primary sm:text-sm" id="login-password" name="password" required=""/>
<button @click="showPassword = !showPassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-stone-400 hover:text-stone-600 dark:hover:text-stone-200" type="button">
<span class="material-symbols-outlined text-xl" x-text="showPassword ? 'visibility_off' : 'visibility'"></span>
</button>
</div>
</div>
<div class="flex items-center justify-end">
<div class="text-sm">
</div>
</div>
<div>
<button class="flex w-full justify-center rounded-lg bg-primary py-3 px-4 text-sm font-semibold text-white shadow-sm transition-all duration-300 ease-in-out hover:shadow-lg hover:scale-105" type="submit">Giriş Yap</button>
</div>
</form>
</div>
</div>
<div class="mt-6 text-center text-sm text-stone-600 dark:text-stone-400">
<p>Hesabın yok mu? <a class="font-medium text-primary hover:text-opacity-80 transition-colors cursor-pointer" href="sign-up.html">Kaydol</a></p>
</div>
</div>
</div>
<script defer="" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</div>

<script>

  document.addEventListener("DOMContentLoaded", () => {

  // 🔐 ADMIN HESABI (otomatik)
  const ADMIN_USER = {
    email: "admin@bagverse.com",
    password: "123456",
    verified: true
  };

  let users = JSON.parse(localStorage.getItem("users") || "[]");

  const adminExists = users.some(u => u.email === ADMIN_USER.email);

  if (!adminExists) {
    users.push(ADMIN_USER);
    localStorage.setItem("users", JSON.stringify(users));
    console.log("Admin hesabı otomatik oluşturuldu");
  }

  // ⬇️ BURADAN SONRASI SENİN MEVCUT LOGIN KODUN ⬇️

  });

  const ADMIN_EMAIL = "admin@bagverse.com";

document.addEventListener("DOMContentLoaded", () => {
 const loginForm = document.querySelector("#login-email").closest("form"); 
   loginForm.addEventListener("submit", (event) => {
   event.preventDefault();
 const email = document.getElementById("login-email").value.trim();
 const password = document.getElementById("login-password").value.trim();
 if (!email || !password) {
alert("Lütfen e-posta ve şifreyi doldurun!");
 return;
}
 // Kayıtlı kullanıcıları oku
 const users = JSON.parse(localStorage.getItem("users") || "[]");
// Bu email kayıtlı mı?
const user = users.find(u => u.email === email);
 if (!user) {
alert("Bu e-posta ile kayıtlı bir hesap bulunamadı!");
return;
}
 // Şifre doğru mu?
if (user.password !== password) {
alert("Şifre hatalı!");
 return;
}
 // Hesap doğrulanmış mı?
 if (!user.verified) {
alert("Bu hesap henüz doğrulanmamış! Lütfen e-posta doğrulaması yapın.");
 return;
 }
 // Başarılı giriş 🎉
alert("Giriş başarılı! 🎉");

// admin mail kontrolü
const ADMIN_EMAIL = "admin@bagverse.com";
const isAdmin = email === ADMIN_EMAIL;

// currentUser içine role ekle
const loggedUser = {
  ...user,
  role: isAdmin ? "admin" : "user"
};

localStorage.setItem("currentUser", JSON.stringify(loggedUser));

// yönlendirme
if (isAdmin) {
  window.location.href = "admin.html";
} else {
  window.location.href = "products.html";
}
  });
  });
</script>



</body></html>
