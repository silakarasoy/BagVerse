</label>

<option>09</option>

<script>
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
const paymentMethods = JSON.parse(localStorage.getItem("paymentMethods")) || [];

// 1️⃣ URL'den kart id al
const params = new URLSearchParams(window.location.search);
const cardId = Number(params.get("id"));

if (!cardId) {
  alert("Kart bulunamadı");
  window.location.href = "payment-methods.html";
}

// 2️⃣ Kartı bul
const card = paymentMethods.find(
  c => c.id === cardId && c.userEmail === currentUser.email
);

if (!card) {
  alert("Bu karta erişimin yok");
  window.location.href = "payment-methods.html";
}

// Kart önizleme
document.getElementById("cardPreview").textContent =
  `${card.type} kartı •••• •••• •••• ${card.last4}`;


// 3️⃣ Form alanlarını doldur
document.getElementById("cardNameInput").value = card.name;

document.querySelectorAll("select")[0].value =
  String(card.expiryMonth).padStart(2, "0");

document.querySelectorAll("select")[1].value =
  String(card.expiryYear);

document.getElementById("default-payment").checked = card.isDefault;

// 4️⃣ Kaydet
document.querySelector("form").addEventListener("submit", e => {
  e.preventDefault();

  const updatedMethods = paymentMethods.map(c => {
    if (c.id === card.id && c.userEmail === currentUser.email) {
      return {
        ...c,
        name: document.getElementById("cardNameInput").value,
       expiryMonth: Number(document.querySelectorAll("select")[0].value),
expiryYear: Number(document.querySelectorAll("select")[1].value),

        isDefault: document.getElementById("default-payment").checked
      };
    }

    // başka kartlar varsayılan olamaz
    if (
      document.getElementById("default-payment").checked &&
      c.userEmail === currentUser.email
    ) {
      return { ...c, isDefault: false };
    }

    return c;
  });

  localStorage.setItem("paymentMethods", JSON.stringify(updatedMethods));

  showToast("Değişiklikler kaydedildi ✅");

  setTimeout(() => {
    window.location.href = "payment-methods.html";
  }, 1200);
});


// 5️⃣ Sil
 document.getElementById("deleteCardBtn").addEventListener("click", () => {
  if (!confirm("Bu kartı silmek istiyor musun?")) return;

  const updated = paymentMethods.filter(c => c.id !== card.id);
  localStorage.setItem("paymentMethods", JSON.stringify(updated));
  window.location.href = "payment-methods.html";
});

function showToast(message) {
  const toast = document.getElementById("toast");
  const text = document.getElementById("toastText");

  text.textContent = message;
  toast.classList.remove("hidden");
  toast.classList.add("flex");

  setTimeout(() => {
    toast.classList.add("hidden");
    toast.classList.remove("flex");
  }, 1500);
}

</script>

<div
  id="toast"
  class="fixed bottom-6 right-6 z-50 hidden items-center gap-3 rounded-lg
         bg-slate-900 text-white px-4 py-3 shadow-lg">
  <span class="material-symbols-outlined text-green-400">check_circle</span>
  <span id="toastText" class="text-sm font-medium"></span>
